<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lale.uk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="wordmark" href="index.html">lale.uk</a>
  <button id="contactBtn">Contact</button>
</header>

<div class="stars" id="stars" aria-hidden="true"></div>

<div class="turn-section" id="turnSection">
  <div class="stage-sticky">

    <div class="leopard-bg" aria-hidden="true"></div>

    <div class="stage">
      <div class="robot" id="robot">

        <div class="face front">
          <div class="top-screen">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
          <div class="body-wrap">
            <div class="side-arm"></div>
            <div class="body-screen">
              <div class="name-plate">Lale <span class="heart">&hearts;</span></div>
              <div class="proj-row">
                <a class="proj-btn" href="project-robotic-hand.html">Robotic<br>Hand</a>
                <a class="proj-btn" href="project-video-game.html">Video<br>Game</a>
              </div>
            </div>
            <div class="side-arm"></div>
          </div>
          <div class="tracks"><div></div><div></div><div></div><div></div></div>
        </div>

        <div class="face back">
          <div class="top-screen"></div>
          <div class="body-wrap">
            <div class="side-arm"></div>
            <div class="copyright-screen">
              <span class="name">&copy; 2026</span>
              <span class="c">Lale Muhamd</span>
            </div>
            <div class="side-arm"></div>
          </div>
          <div class="tracks"><div></div><div></div><div></div><div></div></div>

          <div class="card-arm" id="cardArm">
            <div class="arm-pole"></div>
            <div class="contact-card">
              <h3>Get in touch</h3>
              <a href="mailto:lale.muhamad@outlook.com">lale.muhamad@outlook.com</a>
              <a href="https://github.com/Chnazzzy" target="_blank" rel="noopener">github.com/Chnazzzy</a>
              <span>Birmingham, UK</span>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  // scatter stars across the page
  const starsHost = document.getElementById('stars');
  const glyphs = ['\u2726','\u2727','\u2605','\u2739'];
  for (let i = 0; i < 36; i++){
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = glyphs[i % glyphs.length];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.fontSize = (8 + Math.random() * 16) + 'px';
    s.style.animationDelay = (Math.random() * 3.4) + 's';
    starsHost.appendChild(s);
  }

  const turnSection = document.getElementById('turnSection');
  const robot = document.getElementById('robot');
  const cardArm = document.getElementById('cardArm');
  const contactBtn = document.getElementById('contactBtn');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  let lastProgress = 0;

  function updateTurn(){
    robot.classList.remove('forced-turn');
    const rect = turnSection.getBoundingClientRect();
    const scrollable = turnSection.offsetHeight - window.innerHeight;
    const progress = clamp(-rect.top / scrollable, 0, 1);
    lastProgress = progress;

    robot.style.transform = reduceMotion
      ? `rotateY(${progress > 0.5 ? 180 : 0}deg)`
      : `rotateY(${progress * 180}deg)`;

    if (progress < 0.45) cardArm.classList.remove('visible');
  }

  window.addEventListener('scroll', updateTurn, { passive: true });
  window.addEventListener('resize', updateTurn);
  updateTurn();

  // Contact: force the robot to face-back immediately (so it always
  // works, regardless of scroll math/timing) and lift the card,
  // then ease the page toward the back position too.
  contactBtn.addEventListener('click', () => {
    robot.classList.add('forced-turn');
    cardArm.classList.add('visible');

    const target = turnSection.offsetTop + turnSection.offsetHeight - window.innerHeight;
    window.scrollTo({ top: target, behavior: reduceMotion ? 'auto' : 'smooth' });
  });
</script>

</body>
</html>
