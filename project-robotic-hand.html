<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Game — lale.uk</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="wordmark" href="index.html">lale.uk</a>
  <a class="back-link" href="index.html">&larr; Back</a>
</header>

<div class="stars" id="stars" aria-hidden="true"></div>
<div class="leopard-bg" aria-hidden="true"></div>

<section class="project-hero">
  <span class="project-badge">Project 02</span>
  <h1>Video Game</h1>
  <p>
    A 2D fantasy game with quests to complete, built from scratch and published
    for anyone to play. Details, screenshots, and a link to play it will land here
    once it's ready.
  </p>
</section>

<script>
  const starsHost = document.getElementById('stars');
  const glyphs = ['\u2726','\u2727','\u2605','\u2739'];
  for (let i = 0; i < 26; i++){
    const s = document.createElement('span');
    s.className = 'star';
    s.textContent = glyphs[i % glyphs.length];
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.fontSize = (8 + Math.random() * 16) + 'px';
    s.style.animationDelay = (Math.random() * 3.4) + 's';
    starsHost.appendChild(s);
  }
</script>
</body>
</html>
